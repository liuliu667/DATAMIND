appId: com.datamind.v1
productName: DATAMIND
copyright: 'Copyright © 2024 奶酪数智'
directories:
  output: release
publish: never
asar: true
defaultArch: "universal"
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
win:
  target:
    - nsis
    - portable
  icon: build/icon.png
  publisherName: '奶酪数智'
  verifyUpdateCodeSignature: false
  signingHashAlgorithms:
    - sha256
mac:
  target:
    - dmg
  icon: build/icon.png
  identity: null
  gatekeeperAssess: false
  hardenedRuntime: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DATAMIND
  artifactName: DATAMIND-V1.2-Setup-${version}.${ext}
  uninstallDisplayName: DATAMIND V1.2
  license: LICENSE.txt
  include: build/installer.nsh
  deleteAppDataOnUninstall: false
portable:
  artifactName: DATAMIND-V1.2-Portable-${version}.${ext}
dmg:
  artifactName: DATAMIND-V1.2-Mac-${version}.${ext}
  contents:
    - x: 110
      y: 150
    - x: 410
      y: 150
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
